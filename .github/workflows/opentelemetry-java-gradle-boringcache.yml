name: "OpenTelemetry Java Gradle - BoringCache"
run-name: >-
  BC | ${{ github.event_name == 'push' && github.event.head_commit.message || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name) }}

on:
  workflow_dispatch:
    inputs:
      cli_ref:
        description: "Optional boringcache/cli ref to build and use instead of the released CLI"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/workflows/opentelemetry-java-gradle-boringcache.yml"
      - ".github/workflows/opentelemetry-java-gradle-actions-cache.yml"
      - ".github/workflows/reusable-gradle-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

permissions:
  contents: read
  actions: read

jobs:
  benchmark:
    uses: ./.github/workflows/reusable-gradle-benchmark.yml
    with:
      benchmark_id: otel-gradle
      project_repo: open-telemetry/opentelemetry-java
      strategy: boringcache
      java_version: "21"
      # Pin japicmp baseline so the pinned source stays benchmarkable after newer releases land.
      build_command: ./gradlew --no-daemon build -x test -Porg.gradle.java.installations.auto-download=false -PapiBaseVersion=1.59.0
    secrets: inherit
